name: E2E Tests

on:
  push:
    branches: [development]
  pull_request:
    branches: [main]

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: scoutiq
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install backend dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Create database schema
        working-directory: backend
        env:
          DATABASE_URL: postgresql://postgres:password@localhost:5432/scoutiq
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
        run: |
          python -c "import app.models.user, app.models.player, app.models.club, app.models.league, app.models.report, app.models.saved_prospect, app.models.player_view, app.models.player_contract, app.models.password_reset_token, app.models.player_market_value_history, app.models.player_highlight, app.models.notification; from app.database import Base, engine; Base.metadata.create_all(engine)"

      - name: Seed demo data
        working-directory: backend
        env:
          DATABASE_URL: postgresql://postgres:password@localhost:5432/scoutiq
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
        run: |
          python migrations/seed.py
          python -m app.migrations.add_player_stats_and_history
          python -m app.migrations.seed_demo_players
          python -m app.migrations.redesign_contracts

      - name: Start backend
        working-directory: backend
        env:
          DATABASE_URL: postgresql://postgres:password@localhost:5432/scoutiq
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
          JWT_ALGORITHM: HS256
          ACCESS_TOKEN_EXPIRE_MINUTES: 15
          REFRESH_TOKEN_EXPIRE_DAYS: 7
          ALLOWED_ORIGINS: http://localhost:4173
        run: |
          python -m uvicorn app.main:app --host 0.0.0.0 --port 8000 &
          sleep 5

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install root dependencies
        run: npm install

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_URL: http://localhost:8000
        run: npm run build

      - name: Serve frontend
        working-directory: frontend
        run: |
          npx vite preview --port 4173 --host &
          sleep 3

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        env:
          BASE_URL: http://localhost:4173
          TEST_ADMIN_EMAIL: ${{ secrets.TEST_ADMIN_EMAIL }}
          TEST_ADMIN_PASSWORD: ${{ secrets.TEST_ADMIN_PASSWORD }}
          TEST_CLUB_ADMIN_EMAIL: ${{ secrets.TEST_CLUB_ADMIN_EMAIL }}
          TEST_CLUB_ADMIN_PASSWORD: ${{ secrets.TEST_CLUB_ADMIN_PASSWORD }}
          TEST_SCOUT_EMAIL: ${{ secrets.TEST_SCOUT_EMAIL }}
          TEST_SCOUT_PASSWORD: ${{ secrets.TEST_SCOUT_PASSWORD }}
          TEST_PLAYER_EMAIL: ${{ secrets.TEST_PLAYER_EMAIL }}
          TEST_PLAYER_PASSWORD: ${{ secrets.TEST_PLAYER_PASSWORD }}
        run: npx playwright test

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
